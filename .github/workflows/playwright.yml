name: CI

on:
  push:
    branches: [main, develop]

  pull_request:
    branches: [main, develop]

  schedule:
    - cron: "0 18 * * *"

  workflow_dispatch:
    inputs:
      suite:
        description: Suite to run
        required: true
        default: smoke
        type: choice
        options:
          - demo
          - smoke
          - regression

      browser:
        description: Browser used for test execution
        required: true
        default: chromium
        type: choice
        options:
          - chromium
          - firefox

      workers:
        description: Number of parallel workers
        required: true
        default: "1"
        type: string

      base_url:
        description: Target application URL
        required: true
        default: https://www.demoblaze.com
        type: string

      api_url:
        description: Target API URL
        required: true
        default: https://api.demoblaze.com
        type: string

env:
  BASE_URL: ${{ inputs.base_url || 'https://www.demoblaze.com' }}
  API_URL: ${{ inputs.api_url || 'https://api.demoblaze.com' }}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # 1) GATE CHECK
  build:
    name: Gate Check
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check (build gate)
        run: npm run typecheck

  # 2) DEMO
  demo:
    name: E2E Demo Automation
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.suite == 'demo' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Clean Allure results
        run: npm run allure:clean

      - name: Install Playwright browsers
        run: npx playwright install --with-deps "${{ inputs.browser }}"

      - name: Run E2E demo tests
        run: >
          npx playwright test tests/e2e
          --grep @demo
          --project="${{ inputs.browser }}"
          --workers="${{ inputs.workers }}"

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: demo-playwright-report
          path: reports/playwright/
          retention-days: 7

      - name: Upload raw Allure results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: demo-allure-results
          path: reports/allure/results/
          retention-days: 7

  # 3) SMOKE - manual trigger
  smoke:
    name: E2E Smoke
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.suite == 'smoke' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Clean Allure results
        run: npm run allure:clean

      - name: Install Playwright browsers
        run: npx playwright install --with-deps "${{ inputs.browser }}"

      - name: Run E2E smoke tests
        run: >
          npx playwright test tests/e2e
          --grep @smoke
          --project="${{ inputs.browser }}"
          --workers="${{ inputs.workers }}"

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-playwright-report
          path: reports/playwright/
          retention-days: 7

      - name: Upload raw Allure results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-allure-results
          path: reports/allure/results/
          retention-days: 7

  # 4) SMOKE GATE FOR NIGHTLY REGRESSION
  smoke_gate:
    name: Smoke Gate Check
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.suite == 'regression') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Clean Allure results
        run: npm run allure:clean

      - name: Install Playwright browsers
        run: npx playwright install --with-deps "${{ inputs.browser || 'chromium' }}"

      - name: Run E2E smoke tests as gate
        run: >
          npx playwright test tests/e2e
          --grep @smoke
          --project="${{ inputs.browser || 'chromium' }}"
          --workers="${{ inputs.workers || '1' }}"

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-gate-playwright-report
          path: reports/playwright/
          retention-days: 7

      - name: Upload raw Allure results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-gate-allure-results
          path: reports/allure/results/
          retention-days: 7

  # 5) REGRESSION
  regression:
    name: E2E Regression
    needs: smoke_gate
    if: ${{ (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.suite == 'regression')) && needs.smoke_gate.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Clean Allure results
        run: npm run allure:clean

      - name: Install Playwright browsers
        run: >
          npx playwright install --with-deps
          "${{ inputs.browser || 'chromium' }}"

      - name: Run all E2E tests
        run: >
          npx playwright test tests/e2e
          --grep @regression
          --project="${{ inputs.browser || 'chromium' }}"
          --workers="${{ inputs.workers || '1' }}"

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-playwright-report
          path: reports/playwright/
          retention-days: 14

      - name: Upload test results (JUnit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-junit
          path: reports/results.xml
          retention-days: 14

      - name: Upload raw Allure results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-allure-results
          path: reports/allure/results/
          retention-days: 14

  # 6) PAGES PUBLISH
  publish_pages:
    name: Publish GitHub Pages
    needs: [demo, smoke, smoke_gate, regression]
    if: ${{ always() && (needs.demo.result == 'success' || needs.smoke.result == 'success' || needs.smoke_gate.result == 'success' || needs.regression.result == 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Clean stale Allure results
        run: npm run allure:clean

      - name: Download demo raw Allure results artifact
        if: ${{ needs.demo.result == 'success' }}
        uses: actions/download-artifact@v4
        with:
          name: demo-allure-results
          path: reports/allure/results

      - name: Download smoke raw Allure results artifact
        if: ${{ needs.smoke.result == 'success' }}
        uses: actions/download-artifact@v4
        with:
          name: smoke-allure-results
          path: reports/allure/results

      - name: Download smoke gate raw Allure results artifact
        if: ${{ needs.smoke_gate.result == 'success' }}
        uses: actions/download-artifact@v4
        with:
          name: smoke-gate-allure-results
          path: reports/allure/results

      - name: Download regression raw Allure results artifact
        if: ${{ needs.regression.result == 'success' }}
        uses: actions/download-artifact@v4
        with:
          name: regression-allure-results
          path: reports/allure/results

      - name: Generate Allure report
        if: always()
        run: |
          npx allure generate reports/allure/results --clean -o reports/allure/report

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/allure/report/

      - name: Deploy to GitHub Pages
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
